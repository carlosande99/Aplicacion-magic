<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      BASE DE DATOS DE CARTAS
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <!-- botones de opciones -->
  <div class="d-flex justify-content-between mt-2">
    <button class="btn btn-secondary ms-2" (click)="ediciones()">Búsqueda de sets</button>
    <button class="btn btn-info me-2" (click)="abrirModalAvanzadas()">Búsqueda Avanzada</button>
  </div>
  <div class="d-flex flex-column">
    <!-- buscador por nombre -->
    <div class="d-flex justify-content-center align-items-center mt-2">
      <form [formGroup]="miFormulario" (ngSubmit)="enviar()" class="d-flex justify-content-center align-items-center">
        <input
          type="text"
          formControlName="nombre"
          class="border fs-4 flex-grow-1 rounded-pill px-3"
          placeholder="Buscar por nombre"
        >
        <button class="borrar" type="reset"><span>X</span></button>
        <button type="submit" style="display: none;"></button>
      </form>
    </div>
    <!-- svg de carga -->
    @if(!espera){
      <div class="d-flex justify-content-center align-items-center cargando">
        <div class="spinner-border text-primary" role="status"></div>
      </div>
    }
    <!-- opcion de carta no encontrada -->
    @if(sincartas){
      <div class="d-flex justify-content-center align-items-center cargando">
        <h3>Carta no encontrada</h3>
      </div>
    }
    <!-- cartas mostradas -->
    @if(espera){
      <!-- cartas mostradas por nombre o por set -->
      @if(cartas.length > 0){
        <div class="d-flex justify-content-center mt-2">
          <h3>Mostrado un total de {{cartas.length}} cartas.</h3>
        </div>
        <div class="cartas">
          @for(carta of cartas; track carta.id){
            <button class="boton-cartas" [id]="carta.id" (click)="abrirModal(carta)">
              @if(carta.image_uris){
                <ion-img
                  [src]="carta.image_uris.png" class="imagenCarta mt-2 mb-1">
                </ion-img>
              }@else {
                <ion-img
                  [src]="carta.card_faces[visibleFace]?.image_uris.png"
                  class="imagenCarta mt-2 mb-1">
                </ion-img>
                <button type="button" class="botonGirar" [class.segunda-cara]="visibleFace === 1" (click)="toggleFace(); $event.stopPropagation()">
                  <svg focusable="false" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
                    <path d="M884.3,357.6c116.8,117.7,151.7,277-362.2,320V496.4L243.2,763.8L522,1031.3V860.8C828.8,839.4,1244.9,604.5,884.3,357.6z"></path>
                    <path d="M557.8,288.2v138.4l230.8-213.4L557.8,0v142.8c-309.2,15.6-792.1,253.6-426.5,503.8C13.6,527.9,30,330.1,557.8,288.2z"></path>
                  </svg>
                </button>
              }
            </button>
          }
        </div>
      }
      <!-- nombre de todos los sets -->
      @if(sets.length > 0){
        <div class="ms-2 mt-1 mb-3">
          @for(set of sets; track set.id){
            <button class="boton-cartas boton-sets mb-2" [id]="set.id" (click)="cartasEdiciones(set.search_uri)">
              <ion-img [src]="set.icon_svg_uri" class="iconSets me-1" color="white"></ion-img>
              <ion-text>{{set.name}}<span>({{set.code}})</span></ion-text>
            </button>
          }
        </div>
      }
    }
  </div>
</ion-content>
