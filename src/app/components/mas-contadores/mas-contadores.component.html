@if (visible) {
  <div class="overlay">
    <div class="w-100 cerrar">
        <button class="btn btn-danger"  (click)="cerrarOverlay()">X</button>
    </div>
    <div class="contador-box">
      <div class="d-flex w-100 justify-content-around">
        <button class="d-flex border border-white rounded align-items-center justify-content-center" (click)="rendirse()">
            <div class="d-flex align-items-center justify-content-center flex-column">
                <div class="divImage">
                    <img src="assets/icon/svg/c18.svg" alt="muerte" class="icon">
                </div>
                <div class="divTitulo flex-fill m-1">
                    <h4 class="text-white m-0">RENDIRSE</h4>
                </div>
            </div>
        </button>
      </div>
      <div class="d-flex align-items-center justify-content-center mt-1 flex-column w-100">
        <div class="w-100 container mt-3">
            <div class="contadores d-flex align-items-center justify-content-center m-1">
              <div class="d-flex flex-column align-items-center justify-content-center contenedor-icono">
                  <div class="divTitulo flex-fill">
                      <h4 class="text-white m-0">DAÑO</h4>
                      <h4 class="text-white m-0">OPONENTES</h4>
                  </div>
              </div>
              <div class="d-flex border border-white rounded align-items-center justify-content-center flex-fill">
                  <button class="flex-fill text-end bg-transparent me-2" (click)="danoOponentes(-1)">
                      <span class="simbolos">-</span>
                  </button>
                  <h4 class="text-white m-0 simbolos">
                      {{contadoresOponentes}}
                  </h4>
                  <button class="flex-fill text-start bg-transparent ms-2" (click)="danoOponentes(1)">
                      <span class="simbolos">+</span>
                  </button>
              </div>
            </div>
            <div class="contadores d-flex align-items-center justify-content-center m-1">
              <div class="d-flex flex-column align-items-center justify-content-center contenedor-icono">
                  <div class="divTitulo flex-fill">
                      <h4 class="text-white m-0">DAÑO</h4>
                      <h4 class="text-white m-0">JUGADORES</h4>
                  </div>
              </div>
              <div class="d-flex border border-white rounded align-items-center justify-content-center flex-fill">
                  <button class="flex-fill text-end bg-transparent me-2" (click)="danoPlayers(-1)">
                      <span class="simbolos">-</span>
                  </button>
                  <h4 class="text-white m-0 simbolos">
                      {{contadoresPlayers}}
                  </h4>
                  <button class="flex-fill text-start bg-transparent ms-2" (click)="danoPlayers(1)">
                      <span class="simbolos">+</span>
                  </button>
              </div>
            </div>
        </div>
      </div>
    </div>
  </div>
}
