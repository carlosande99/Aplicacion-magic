@if (visible) {
  <div class="overlay">
    <div class="w-100 cerrar">
      <button class="btn btn-danger"  (click)="guardarValor()">X</button>
    </div>
    <div class="w-100 contador-box" (click)="$event.stopPropagation()">
      <div class="d-flex align-items-center justify-content-center mt-1">
        <div class="divImage">
          <img src="assets/icon/impuesto_comander.svg" alt="impuesto comandante" class="icon">
        </div>
        <div class="divTitulo flex-fill">
          <h4 class="text-white m-0 fs-6">IMPUESTO</h4>
        </div>
      </div>
      @if (!camaradaValor) {
        <div class="d-flex w-100 align-items-center justify-content-center">
          <div class="d-flex border border-white rounded align-items-center justify-content-center mt-2 flex-fill me-1 ms-1 mb-1">
            <button class="flex-fill text-end bg-transparent me-2" (click)="restarPrincipal()">
              <span class="simbolos">-</span>
            </button>
            <h4 class="text-white m-0">
              {{ valorPrincipal }}
            </h4>
            <button class="flex-fill text-start bg-transparent ms-2" (click)="sumarPrincipal()">
              <span class="simbolos">+</span>
            </button>
          </div>
        </div>
      } @else {
        <div class="d-flex w-100 align-items-center justify-content-center">
          
          <div class="d-flex border border-white rounded align-items-center justify-content-center mt-2 flex-fill me-1 ms-1 mb-1">
            <button class="flex-fill text-end bg-transparent me-2" (click)="restarPrincipal()">
              <span class="simbolos">-</span>
            </button>
            <h4 class="text-white m-0">
              {{ valorPrincipal }}
            </h4>
            <button class="flex-fill text-start bg-transparent ms-2" (click)="sumarPrincipal()">
              <span class="simbolos">+</span>
            </button>
          </div>
          
          <div class="d-flex border border-white rounded align-items-center justify-content-center mt-2 flex-fill ms-1 me-1 mb-1">
            <button class="flex-fill text-end bg-transparent me-2" (click)="restarSecundario()">
              <span class="simbolos">-</span>
            </button>
            <h4 class="text-white m-0">
              {{ valorSecundario }}
            </h4>
            <button class="flex-fill text-start bg-transparent ms-2" (click)="sumarSecundario()">
              <span class="simbolos">+</span>
            </button>
          </div>
        </div>
      }
      <div class="form-check form-switch d-flex align-items-center justify-content-center m-0">
        <input type="checkbox" role="switch" class="form-check-input m-0" [id]="'switchCheck-' + nombre" [checked]="camaradaValor" (change)="guardarCamarada($event)">
        <div class="d-flex align-items-end justify-content-end ms-1">
          <label [for]="'switchCheck-' + nombre" class="form-check-label">CAMARADA</label>
        </div>
      </div>

    </div>
  </div>
}
